<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium - Footballive90</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00e676; --dark-bg: #0f172a; --card-bg: #1e293b; --text-light: #f8fafc; --gold: #fbbf24; }
        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s ease; }
        body { background-color: var(--dark-bg); color: var(--text-light); font-family: 'Poppins', sans-serif; }
        body.rtl { font-family: 'Vazirmatn', sans-serif; direction: rtl; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(15, 23, 42, 0.95); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 24px; font-weight: 900; color: white; text-decoration: none; }
        .logo span { color: var(--primary); }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: var(--text-light); text-decoration: none; font-weight: 600; font-size: 14px; }
        .lang-switch { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 5px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        .pricing-section { padding: 80px 5%; text-align: center; }
        .pricing-container { display: flex; justify-content: center; gap: 30px; margin-top: 40px; flex-wrap: wrap; }
        .price-card { background: var(--card-bg); padding: 40px; border-radius: 20px; width: 300px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .price-card.premium { border: 2px solid var(--gold); transform: scale(1.05); }
        .popular-badge { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 12px; }
        .plan-name { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .price-val { font-size: 36px; font-weight: 900; color: var(--primary); margin-bottom: 20px; }
        .features-list { list-style: none; margin-bottom: 30px; text-align: left; }
        body.rtl .features-list { text-align: right; }
        .features-list li { margin-bottom: 10px; font-size: 14px; color: #ccc; }
        .btn-sub { width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; }
        .btn-std { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-prem { background: var(--gold); color: #000; }

        @media (max-width: 768px) { .nav-links { display: none; } .price-card.premium { transform: scale(1); } }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo"><span>Footballive90</span></a>
        <nav class="nav-links">
            <a href="index.html" class="text-nav-home">Home</a>
            <a href="pyment.html" class="active text-nav-premium">Premium</a>
        </nav>
        <button class="lang-switch" onclick="toggleLanguage()">EN/FA</button>
    </header>

    <section class="pricing-section">
        <h1 id="page-title" style="font-size: 36px; margin-bottom: 10px;"></h1>
        <p id="page-sub" style="color: #aaa;"></p>

        <div class="pricing-container" id="plans-grid"></div>
    </section>

    <script>
        // --- ویرایش کنید (قیمت‌ها) ---
        const PLANS_DATA = {
            "title_en": "Choose Your Plan", "title_fa": "انتخاب پلن",
            "sub_en": "Unlock all features and remove ads.", "sub_fa": "تمام ویژگی‌ها را باز کنید و تبلیغات را حذف کنید.",
            "month_en": "/ mo", "month_fa": "/ ماه",
            "plans": [
                {
                    "name_en": "Standard", "name_fa": "استاندارد",
                    "price": "Free", "features": ["Live Scores", "Basic News"], // لیست کوتاه شده برای مثال
                    "btn_text_en": "Current Plan", "btn_text_fa": "پلن فعلی",
                    "is_premium": false
                },
                {
                    "name_en": "Premium", "name_fa": "پریمیوم",
                    "price": "$4.99", "features": ["Live Scores", "Unlimited News", "No Ads", "Fast Updates"],
                    "btn_text_en": "Upgrade Now", "btn_text_fa": "خرید اشتراک",
                    "badge_text_en": "Most Popular", "badge_text_fa": "محبوب‌ترین",
                    "is_premium": true
                }
            ]
        };

        let currentLang = 'en';
        if(window.location.hostname.includes('.ir')) currentLang = 'fa';

        function setLanguage(lang) {
            currentLang = lang;
            const t = PLANS_DATA;
            const l = lang === 'fa' ? 'fa' : 'en';

            document.getElementById('page-title').textContent = t[`title_${l}`];
            document.getElementById('page-sub').textContent = t[`sub_${l}`];

            const plansHtml = t.plans.map(p => {
                const badge = p.is_premium ? `<div class="popular-badge">${p[`badge_text_${l}`]}</div>` : '';
                const features = p.features.map(f => `<li><i>✓</i> ${f}</li>`).join('');
                const btnClass = p.is_premium ? 'btn-sub btn-prem' : 'btn-sub btn-std';
                
                return `
                    <div class="price-card ${p.is_premium ? 'premium' : ''}">
                        ${badge}
                        <div class="plan-name">${p[`name_${l}`]}</div>
                        <div class="price-val">${p.price} <span style="font-size:14px;color:#fff;">${t[`month_${l}`]}</span></div>
                        <ul class="features-list">${features}</ul>
                        <button class="${btnClass}">${p[`btn_text_${l}`]}</button>
                    </div>
                `;
            }).join('');
            
            document.getElementById('plans-grid').innerHTML = plansHtml;

            if (lang === 'fa') { document.body.classList.add('rtl'); document.body.style.fontFamily = "'Vazirmatn', sans-serif"; document.documentElement.dir = "rtl"; }
            else { document.body.classList.remove('rtl'); document.body.style.fontFamily = "'Poppins', sans-serif"; document.documentElement.dir = "ltr"; }
        }
        function toggleLanguage() { setLanguage(currentLang === 'en' ? 'fa' : 'en'); }
        window.onload = () => setLanguage(currentLang);
    </script>
</body>
</html>
