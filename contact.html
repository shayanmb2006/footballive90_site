<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Footballive90</title>
    <meta name="description" content="Contact Footballive90 team. Send us a message or reach us via email.">
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body data-page="contact">

    <div id="site-header"></div>

    <div class="contact-wrap">
        <div class="contact-info">
            <h2 id="page-title"></h2>
            <p id="page-desc" style="color:var(--text-dim); margin-bottom:24px;"></p>
            <div id="info-list"></div>
        </div>

        <form class="contact-form" id="contact-form">
            <div class="form-group">
                <label class="form-label" id="label-name"></label>
                <input type="text" class="form-input" id="contact-name" required>
            </div>
            <div class="form-group">
                <label class="form-label" id="label-email"></label>
                <input type="email" class="form-input" id="contact-email" required>
            </div>
            <div class="form-group">
                <label class="form-label" id="label-msg"></label>
                <textarea class="form-input" id="contact-message" rows="5" required></textarea>
            </div>
            <div class="form-message" id="form-message"></div>
            <button type="submit" class="btn btn-primary" style="width:100%;" id="submit-btn"></button>
        </form>
    </div>

    <div id="site-footer"></div>

    <script src="js/site-config.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/pages/contact.js"></script>
</body>
</html>
